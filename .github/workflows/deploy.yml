
name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # ou master, dependendo do seu branch principal

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Setup Node.js (optional, if you have build steps)
      uses: actions/setup-node@v3
      with:
        node-version: '16'

    - name: Install dependencies (optional)
      run: npm install # Remova se não tiver package.json

    - name: Build project (optional)
      run: npm run build # Remova se não tiver script de build

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./ # Onde seus arquivos estáticos estão (ex: build, dist, ou raiz do projeto)
        # Se o seu site estiver em uma subpasta, altere publish_dir para, por exemplo, ./public
